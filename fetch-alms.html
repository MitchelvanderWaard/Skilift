<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fetch Alm data</title>
<style>
  body{font-family:system-ui,sans-serif;max-width:640px;margin:0 auto;padding:24px;background:#0f1115;color:#e8eaed;line-height:1.5}
  h1{font-size:1.2rem}
  #status{margin:16px 0;padding:14px;border:1px solid #2a2e37;border-radius:10px;background:#161922;white-space:pre-wrap;font-size:.9rem}
  button,a.dl{display:inline-block;margin-top:10px;background:linear-gradient(135deg,#46e596,#1fbf6c);color:#062a14;font-weight:700;
    border:none;border-radius:10px;padding:13px 18px;font-size:1rem;cursor:pointer;text-decoration:none}
  a.dl[hidden]{display:none}
  small{color:#9aa0aa}
</style></head>
<body>
<h1>🛖 Fetch nearby huts & restaurants (one time)</h1>
<p><small>This queries OpenStreetMap for huts/restaurants within 5&nbsp;km of each lift's top station, then lets you download the result. It runs in your browser (which can reach the servers). If it fails, just reload to retry.</small></p>
<div id="status">Starting…</div>
<button id="run">Retry</button>
<a class="dl" id="dl" hidden>⬇ Download alms.json</a>

<script>
const SUMMITS=[
["hahnenkamm",47.427,12.3726],["hornbahn1",47.4638,12.4082],["hornbahn2",47.46694,12.42917],
["horngipfel",47.4763,12.4302],["gaisberg",47.433838,12.300364],["fleckalm",47.4181,12.3575],
["sonnenrast",47.41842,12.358903],["alpenrosen1",47.4108,12.2168],["alpenrosen2",47.3975,12.2178],
["hochbrixen",47.432,12.252],["salven1",47.4602,12.183],["salven2",47.46583,12.20583],
["hochsoell1",47.485,12.205],["salvista",47.4675,12.1845],["harschbichl",47.4848,12.428],
["streuboden",47.4569,12.5409],["laerchfilz",47.444,12.5486],["steinplatte",47.6233,12.5835],
["buchenstein",47.4843,12.581],["almbahn1",47.598,12.673],["almbahn2",47.6081,12.6543],
["schatzberg",47.4,11.995],["markbachjoch",47.4318,12.0971],["wiedersberg",47.3714,11.9289],
["reitherkogel",47.3976,11.8749],["kaiserlift",47.5785,12.212]
];
const S=document.getElementById('status'), DL=document.getElementById('dl');
function log(m){ S.textContent=m; }
function buildQuery(){
  let parts='';
  for(const [,la,lo] of SUMMITS){
    parts+=`node["tourism"~"alpine_hut|wilderness_hut"]["name"](around:5000,${la},${lo});`;
    parts+=`way["tourism"~"alpine_hut|wilderness_hut"]["name"](around:5000,${la},${lo});`;
    parts+=`node["amenity"~"restaurant|cafe"]["name"](around:5000,${la},${lo});`;
  }
  return `[out:json][timeout:180];(${parts});out center;`;
}
async function fetchAll(){
  DL.hidden=true;
  const q=buildQuery();
  const ov='https://overpass-api.de/api/interpreter?data='+encodeURIComponent(q);
  const urls=[
    ov,
    'https://overpass.kumi.systems/api/interpreter?data='+encodeURIComponent(q),
    'https://api.allorigins.win/raw?url='+encodeURIComponent(ov),
    'https://corsproxy.io/?url='+encodeURIComponent(ov)
  ];
  let j=null, lastErr='';
  for(let pass=0; pass<2 && !j; pass++){
    for(let i=0;i<urls.length && !j;i++){
      log(`Fetching… (attempt ${pass*urls.length+i+1} of ${urls.length*2})\nThis can take 10–60 s.`);
      try{
        const ctrl=new AbortController(), to=setTimeout(()=>ctrl.abort(),60000);
        const r=await fetch(urls[i],{signal:ctrl.signal}); clearTimeout(to);
        if(!r.ok){ lastErr='HTTP '+r.status; continue; }
        const t=await r.text(); j=JSON.parse(t);
      }catch(e){ lastErr=(e&&e.message)||String(e); }
    }
  }
  if(!j){ log('❌ Could not reach OpenStreetMap after several tries ('+lastErr+').\nReload the page to try again — the public servers are sometimes busy.'); return; }
  const seen=new Set(), out=[];
  for(const e of (j.elements||[])){
    const id=e.type+'/'+e.id; if(seen.has(id)) continue; seen.add(id);
    const lat=e.lat!=null?e.lat:(e.center&&e.center.lat), lon=e.lon!=null?e.lon:(e.center&&e.center.lon);
    const name=e.tags&&e.tags.name; if(lat==null||lon==null||!name) continue;
    const hut=e.tags.tourism==='alpine_hut'||e.tags.tourism==='wilderness_hut';
    out.push({name, lat:+lat.toFixed(6), lon:+lon.toFixed(6), hours:e.tags.opening_hours||'', hut});
  }
  out.sort((a,b)=> a.name.localeCompare(b.name));
  const huts=out.filter(x=>x.hut).length;
  log(`✅ Done — ${out.length} places (${huts} huts, ${out.length-huts} restaurants/cafés).\nTap "Download alms.json", then upload that file back in the chat.`);
  const blob=new Blob([JSON.stringify(out)],{type:'application/json'});
  DL.href=URL.createObjectURL(blob); DL.download='alms.json'; DL.hidden=false;
}
document.getElementById('run').onclick=fetchAll;
fetchAll();
</script>
</body></html>
