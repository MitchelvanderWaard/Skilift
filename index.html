<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KitzSki + Westendorf · Open Summer Lifts</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0e14; --glass:rgba(18,22,31,.72); --glass2:rgba(255,255,255,.04);
    --stroke:rgba(255,255,255,.10); --stroke2:rgba(255,255,255,.07);
    --txt:#eef1f6; --mut:#9aa3b2; --dim:#6b7480;
    --red:#ff2b3e; --red-soft:rgba(255,43,62,.16);
    --green:#27e08a; --amber:#ffb020;
    --disp:"Outfit",system-ui,sans-serif; --body:"Manrope",system-ui,sans-serif;
    --r:18px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);font-family:var(--body);color:var(--txt);-webkit-font-smoothing:antialiased}
  #map{position:absolute;inset:0;background:#0b0e14}

  .topbar{position:absolute;z-index:600;top:16px;left:16px;right:16px;display:flex;align-items:center;gap:14px;
    padding:12px 16px;border-radius:var(--r);background:var(--glass);backdrop-filter:blur(18px) saturate(1.4);
    -webkit-backdrop-filter:blur(18px) saturate(1.4);border:1px solid var(--stroke);box-shadow:0 18px 50px -20px rgba(0,0,0,.8)}
  .brand{font-family:var(--disp);font-weight:800;font-size:1.12rem;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
  .brand .k{background:var(--red);color:#fff;border-radius:7px;padding:2px 7px;font-size:.85rem;box-shadow:0 4px 14px var(--red-soft)}
  .brand small{font-weight:500;color:var(--mut);font-family:var(--body);font-size:.74rem;margin-left:4px}
  .pill{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:.74rem;color:var(--mut);background:var(--glass2);
    border:1px solid var(--stroke2);padding:6px 12px;border-radius:999px;white-space:nowrap}
  .pill b{color:var(--txt);font-weight:600}
  .live{display:flex;align-items:center;gap:6px;font-size:.74rem;color:#cdd4df;text-decoration:none;background:var(--glass2);
    border:1px solid var(--stroke2);padding:6px 12px;border-radius:999px}
  .live:hover{border-color:var(--red);color:#fff}
  .live .d{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pp 2s infinite}
  @keyframes pp{0%{box-shadow:0 0 0 0 rgba(39,224,138,.5)}70%{box-shadow:0 0 0 7px rgba(39,224,138,0)}100%{box-shadow:0 0 0 0 rgba(39,224,138,0)}}

  .panel{position:absolute;z-index:600;top:16px;right:16px;width:360px;max-height:calc(100vh - 32px);display:flex;
    flex-direction:column;border-radius:var(--r);overflow:hidden;background:var(--glass);backdrop-filter:blur(18px) saturate(1.4);
    -webkit-backdrop-filter:blur(18px) saturate(1.4);border:1px solid var(--stroke);box-shadow:0 24px 60px -24px rgba(0,0,0,.85)}
  .phead{display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--stroke2);user-select:none;position:sticky;top:0;z-index:6;background:rgba(16,19,27,.92);backdrop-filter:blur(10px)}
  .phead .ti{font-family:var(--disp);font-weight:700;font-size:.98rem;flex:none;white-space:nowrap}
  .phead .ct{font-size:.72rem;color:var(--mut);flex:1 1 auto;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .phead .ct b{color:var(--green)}
  .pbtn{flex:none;width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:var(--glass2);
    border:1px solid var(--stroke2);transition:.2s;color:var(--mut);cursor:pointer;font-size:1rem;font-family:var(--body);padding:0}
  .pbtn:hover{color:var(--txt);border-color:var(--stroke)}
  .pbtn .chev{display:grid;place-items:center;transition:transform .25s}
  /* ---- panel states: min (bar) · list · detail (fullscreen) ---- */
  .panel.state-min{cursor:pointer}
  .panel.state-min .days,.panel.state-min .list,.panel.state-min .detail,.panel.state-min .foot{display:none}
  .panel.state-min .phead{border-bottom:none}
  .panel.state-min .ptog .chev{transform:rotate(180deg)}
  .panel:not(.state-detail) .detail{display:none}
  .panel.state-list,.panel.state-detail{inset:0;width:auto;max-height:none;height:100vh;height:100dvh;border-radius:0;z-index:700}
  .panel.state-list .phead{padding-top:calc(11px + env(safe-area-inset-top,0px))}
  .panel.state-detail .phead,.panel.state-detail .days,.panel.state-detail .list,.panel.state-detail .foot{display:none}
  .panel.state-detail .detail{display:block;flex:1;max-height:none;border-top:none}
  .dtoolbar{display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:5;
    margin:-16px -16px 14px;padding:calc(12px + env(safe-area-inset-top,0px)) 16px 12px;
    background:rgba(16,19,27,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--stroke2)}
  .dbtn{background:var(--glass2);border:1px solid var(--stroke2);color:var(--txt);border-radius:9px;
    padding:9px 13px;font-size:.82rem;font-family:var(--body);cursor:pointer;transition:.15s}
  .dbtn:hover{border-color:var(--stroke)}
  .dbtn.min{margin-left:auto}
  .dbtn.full{margin-left:auto;width:34px;text-align:center;padding:7px 0}
  .drive{margin:10px 0;font-size:.82rem;color:var(--txt);background:var(--glass2);border:1px solid var(--stroke2);border-radius:10px;padding:9px 11px;line-height:1.5}
  .drive .est{color:var(--dim);font-size:.72rem}
  .drive a,.wxlink{color:var(--green);text-decoration:none}
  .drive a:hover,.wxlink:hover{text-decoration:underline}
  .wxlink{font-weight:600;white-space:nowrap}
  .listdiv{padding:9px 16px 5px;font-size:.66rem;text-transform:uppercase;letter-spacing:.07em;color:var(--dim);border-top:1px solid var(--stroke2);margin-top:6px}
  .row.closedrow{opacity:.55}
  .row.closedrow .dot{background:var(--dim)}
  .row.closedrow .climb b{color:var(--mut)}
  .hourly{margin:10px 0}
  .hourlyhead{font-size:.74rem;color:var(--mut);margin-bottom:6px}
  .hours{display:flex;gap:5px;overflow-x:auto;padding-bottom:5px}
  .hr{flex:none;width:42px;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;border-radius:9px;background:var(--glass2);border:1px solid var(--stroke2);font-size:.64rem}
  .hr.wet{background:rgba(47,109,240,.18);border-color:rgba(47,109,240,.45)}
  .hr.hike{outline:2px solid rgba(39,224,138,.55);outline-offset:-2px}
  .hr .hh{color:var(--mut)}
  .hr .hi{font-size:.95rem}
  .hr .hp{color:#6ea8ff}
  .hr .ht{font-weight:700;color:var(--txt)}

  .days{display:flex;flex:none;gap:7px;padding:14px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--stroke2)}
  .days::-webkit-scrollbar{display:none}
  .day{flex:0 0 auto;border:1px solid var(--stroke2);background:var(--glass2);color:var(--mut);border-radius:13px;padding:9px 11px;
    cursor:pointer;text-align:center;min-width:60px;transition:.18s;font-family:var(--body)}
  .day .wd{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;opacity:.8}
  .day .dt{font-family:var(--disp);font-weight:700;font-size:1.02rem;color:var(--txt);margin-top:1px}
  .day .c{font-size:.6rem;color:var(--dim);margin-top:2px;font-weight:600}
  .day:hover{border-color:var(--stroke);color:var(--txt)}
  .day.on{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 8px 22px -8px var(--red)}
  .day.on .dt,.day.on .c{color:#fff}
  .day.today .wd{color:var(--red)}
  .day.on.today .wd{color:#fff}

  .list{overflow-y:auto;flex:1;padding:8px}
  .list::-webkit-scrollbar{width:8px}.list::-webkit-scrollbar-thumb{background:var(--stroke);border-radius:8px}
  .row{display:flex;align-items:center;gap:12px;padding:12px;border-radius:13px;cursor:pointer;transition:.15s;border:1px solid transparent}
  .row:hover{background:var(--glass2)}
  .row.sel{background:var(--red-soft);border-color:rgba(255,43,62,.35)}
  .row .dot{width:10px;height:10px;border-radius:50%;background:var(--green);flex:none;box-shadow:0 0 10px var(--green)}
  .row .nm{font-weight:600;font-size:.96rem;letter-spacing:-.01em}
  .row .sub{font-size:.74rem;color:var(--mut);margin-top:1px}
  .row .climb{margin-left:auto;text-align:right;flex:none}
  .row .climb b{font-family:var(--disp);font-weight:700;font-size:1.05rem}
  .row .climb span{display:block;font-size:.58rem;color:var(--dim);text-transform:uppercase;letter-spacing:.1em}
  .empty{padding:30px 16px;text-align:center;color:var(--mut);font-size:.9rem}

  .detail{border-top:1px solid var(--stroke);padding:16px;max-height:52%;overflow-y:auto;background:rgba(0,0,0,.18)}
  .detail h2{font-family:var(--disp);font-weight:800;font-size:1.25rem;margin:0;letter-spacing:-.02em}
  .detail .tag{font-size:.72rem;color:var(--mut);margin:3px 0 14px}
  .alt{display:flex;align-items:stretch;gap:10px;margin-bottom:12px}
  .alt .box{flex:1;background:var(--glass2);border:1px solid var(--stroke2);border-radius:13px;padding:11px 12px}
  .alt .box .l{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--dim)}
  .alt .box .v{font-family:var(--disp);font-weight:700;font-size:1.32rem;margin-top:3px}
  .alt .box .v small{font-size:.66rem;color:var(--mut);font-weight:500}
  .alt .arrow{align-self:center;color:var(--dim);font-size:1.1rem}
  .climbline{display:flex;align-items:baseline;justify-content:space-between;background:linear-gradient(100deg,var(--red-soft),transparent);
    border:1px solid rgba(255,43,62,.3);border-radius:13px;padding:12px 14px;margin-bottom:14px}
  .climbline .l{font-size:.78rem;color:#ffd2d6}
  .climbline .v{font-family:var(--disp);font-weight:800;font-size:1.7rem;color:var(--red)}
  .climbline .v small{font-size:.8rem;color:#ff9aa3;font-weight:600}
  .wxlift{display:flex;align-items:center;gap:9px;margin-bottom:14px;padding:9px 11px;border-radius:11px;
    background:var(--glass2);border:1px solid var(--stroke2);font-size:.8rem;line-height:1.35}
  .wxlift .ic{font-size:1.15rem;flex:none}
  .wxlift .muted{color:var(--mut)}
  .strip{display:flex;gap:4px;margin-bottom:12px}
  .strip .d{flex:1;text-align:center;font-size:.6rem;padding:7px 0;border-radius:8px;background:var(--glass2);color:var(--dim);cursor:pointer}
  .strip .d.on{background:rgba(39,224,138,.16);color:var(--green);border:1px solid rgba(39,224,138,.3)}
  .strip .d.off{color:var(--dim);text-decoration:line-through;opacity:.55}
  .strip .d.act{outline:2px solid var(--txt);outline-offset:1px}
  .panel:not(.state-list) #sortwrap{display:none}
  .sortwrap{flex:none;padding:0 14px 10px}
  .sortbtn{background:var(--glass2);border:1px solid var(--stroke2);color:var(--txt);border-radius:9px;padding:8px 12px;font-size:.78rem;cursor:pointer;font-family:var(--body)}
  .sortopts{display:none;gap:6px;margin-top:8px;flex-wrap:wrap}
  .sortwrap.open .sortopts{display:flex}
  .sortb{background:var(--glass2);border:1px solid var(--stroke2);color:var(--mut);border-radius:8px;padding:6px 11px;font-size:.74rem;cursor:pointer;font-family:var(--body);transition:.15s}
  .sortb.on{border-color:var(--green);color:var(--green)}
  .meta{font-size:.76rem;color:var(--mut);line-height:1.6}
  .meta b{color:var(--txt)}.meta a{color:var(--red);text-decoration:none}.meta a:hover{text-decoration:underline}

  .komootbox{margin-top:12px}
  .kbtn{display:flex;align-items:center;gap:10px;width:100%;text-decoration:none;cursor:pointer;
    padding:15px 15px;border-radius:13px;font-family:var(--body);font-weight:700;font-size:.95rem;color:#062a14;
    background:linear-gradient(135deg,#46e596,#1fbf6c);box-shadow:0 8px 22px -6px rgba(39,224,138,.55);transition:.15s}
  .kbtn:hover{filter:brightness(1.05);transform:translateY(-1px)}
  .kbtn .kt{display:flex;flex-direction:column;line-height:1.25}
  .kbtn .ksub{font-weight:500;font-size:.72rem;opacity:.82}
  .kbtn .karr{margin-left:auto;font-size:1.15rem}
  .alm-pin{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;
    background:rgba(22,25,34,.92);border:2px solid #9aa0aa;box-shadow:0 1px 4px rgba(0,0,0,.5);cursor:pointer}
  .alm-pin.g{border-color:#37e08a;box-shadow:0 0 0 2px rgba(55,224,138,.3),0 1px 4px rgba(0,0,0,.5)}
  .alm-pin.r{border-color:#ff6b6b}
  .alm-pin.x{border-color:#9aa0aa}

  .foot{padding:10px 14px;border-top:1px solid var(--stroke2);font-size:.66rem;color:var(--dim);line-height:1.5}
  .foot b{color:var(--mut)}.foot a{color:var(--mut)}

  /* ---- weather card ---- */
  .wxcard{position:absolute;z-index:600;top:84px;left:16px;width:248px;border-radius:var(--r);overflow:hidden;background:var(--glass);
    backdrop-filter:blur(18px) saturate(1.4);-webkit-backdrop-filter:blur(18px) saturate(1.4);border:1px solid var(--stroke);
    box-shadow:0 18px 50px -20px rgba(0,0,0,.8)}
  .wxhead{display:flex;align-items:center;gap:7px;padding:11px 14px;cursor:pointer;user-select:none;border-bottom:1px solid var(--stroke2)}
  .wxhead .wt{font-family:var(--disp);font-weight:700;font-size:.92rem}
  .wxhead .ws{font-size:.64rem;color:var(--mut)}
  .wxhead .chev{margin-left:auto;color:var(--mut);transition:transform .25s;font-size:.8rem}
  .wxcard.folded .wxbody{display:none}
  .wxcard.folded .wxhead{border-bottom:none}
  .wxcard.folded .chev{transform:rotate(-90deg)}
  .wxbody{padding:6px}
  .wxrow{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:9px}
  .wxrow:hover{background:var(--glass2)}
  .wxrow .ic{font-size:1.12rem;width:22px;text-align:center}
  .wxrow .dy{font-size:.78rem;font-weight:600;width:36px}
  .wxrow .tp{font-family:var(--disp);font-size:.82rem;margin-left:auto}
  .wxrow .tp small{color:var(--mut);font-weight:400}
  .wxrow .pp{font-size:.64rem;color:#7cc4ff;width:30px;text-align:right}
  .wxloading{padding:14px;font-size:.78rem;color:var(--mut);text-align:center}

  /* ---- map markers ---- */
  .pin{width:16px;height:16px;border-radius:50%;background:var(--c,#ff2b3e);border:2.5px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.6);transition:.18s}
  .pin.sel{width:22px;height:22px;animation:ping 1.6s infinite}
  @keyframes ping{0%{box-shadow:0 0 0 0 rgba(255,43,62,.55),0 3px 10px rgba(0,0,0,.6)}70%{box-shadow:0 0 0 14px rgba(255,43,62,0),0 3px 10px rgba(0,0,0,.6)}100%{box-shadow:0 0 0 0 rgba(255,43,62,0),0 3px 10px rgba(0,0,0,.6)}}
  .tip{width:11px;height:11px;background:#fff;border:2.5px solid var(--c,#ff2b3e);transform:rotate(45deg);box-shadow:0 2px 6px rgba(0,0,0,.5)}
  .wxbadge{display:inline-flex;align-items:center;gap:3px;background:rgba(15,18,26,.85);
    -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);color:#eef1f6;border:1px solid var(--stroke);
    border-radius:999px;padding:2px 8px;font-family:var(--body);font-size:.72rem;font-weight:700;white-space:nowrap;
    box-shadow:0 4px 12px rgba(0,0,0,.55);cursor:pointer}
  .wxbadge.sel{border-color:var(--red);background:rgba(255,43,62,.22)}
  .wxbadge.dry{border-color:rgba(39,224,138,.8);box-shadow:0 0 10px rgba(39,224,138,.35),0 4px 12px rgba(0,0,0,.55)}
  .wxbadge.mid{border-color:rgba(245,181,74,.85)}
  .wxbadge.wet{border-color:rgba(94,155,255,.9);background:rgba(47,109,240,.34)}
  .leaflet-popup-content-wrapper{background:#11151e;color:var(--txt);border-radius:13px;border:1px solid var(--stroke);box-shadow:0 18px 40px -16px #000}
  .leaflet-popup-tip{background:#11151e;border:1px solid var(--stroke)}
  .leaflet-popup-content{font-family:var(--body);margin:11px 14px;font-size:.84rem}
  .leaflet-popup-content b{font-family:var(--disp)}
  .leaflet-popup-content .cl{color:var(--red);font-weight:700}
  .leaflet-control-attribution{background:rgba(11,14,20,.7)!important;color:#7b8593!important}
  .leaflet-control-attribution a{color:#9aa3b2!important}
  .leaflet-bar a{background:#11151e;color:#eef1f6;border-color:var(--stroke)}
  .leaflet-bar a:hover{background:#1a2030}

  @media(max-width:780px){
    .topbar{flex-wrap:wrap;gap:8px}.pill{margin-left:0}
    .panel{top:auto;bottom:0;left:0;right:0;width:auto;border-radius:var(--r) var(--r) 0 0;max-height:62vh}
    .panel.full{max-height:none}
    .wxcard{top:104px;width:206px}
    .pbtn{width:40px;height:40px;font-size:1.05rem}
    .dbtn{padding:9px 12px}
  }
</style>
</head>
<body>
<div id="map"></div>

<div class="panel state-min" id="panel">
  <div class="phead" id="phead">
    <span class="ti">Open lifts</span>
    <span class="ct" id="headct"></span>
    <button class="pbtn ptog" id="ptoggle" aria-label="Expand or collapse the list"><span class="chev"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span></button>
  </div>
  <div class="days" id="days"></div>
  <div class="sortwrap" id="sortwrap">
    <button class="sortbtn" id="sortbtn">⇅ Sort</button>
    <div class="sortopts" id="sortopts">
      <button class="sortb" data-k="def">Default</button>
      <button class="sortb" data-k="temp">Temp</button>
      <button class="sortb" data-k="rain">Rain</button>
      <button class="sortb" data-k="drive">Drive</button>
    </div>
  </div>
  <div class="list" id="list"></div>
  <div class="detail" id="detail"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://openingh.openstreetmap.de/opening_hours.js/opening_hours+deps.min.js"></script>
<script>
/* ============================================================
   KitzSki + Westendorf summer lifts on the Kitzbüheler Alpen Sommer Card.
   Heights/length: lift-world.info / seilbahntechnik.net + builder specs.
   Operating windows: sommer-card.at lift pages (2026).
   Coordinates: station points verified via Google Places (valley/mid/top);
   Gaisberg & Sonnenrast user-verified; a few mid-stations/summits still
   anchored to summit/resort (see per-lift note).
   ============================================================ */
/* 7-day window rolling from the actual current date */
const TZ='Europe/Vienna';
const _fmtISO=new Intl.DateTimeFormat('en-CA',{timeZone:TZ,year:'numeric',month:'2-digit',day:'2-digit'});
function isoLocal(d){return _fmtISO.format(d);}            // YYYY-MM-DD in Austria's timezone (DST-safe)
const TODAY=new Date();
const WINDOW=[...Array(7)].map((_,k)=>{const d=new Date(TODAY);d.setDate(d.getDate()+k);return isoLocal(d);});

const LIFTS=[
  // ── KitzSki · Kitzbühel / Kirchberg ───────────────────────────
  { id:"hahnenkamm", name:"Hahnenkammbahn", area:"Kitzbühel · KitzSki", type:"6-seat gondola · 1996",
    valley:786, top:1662, length:2413, valleyLL:[47.4434,12.3896], topLL:[47.4270,12.3726],
    geo:"Valley + top station verified (Google Places)",
    season:"1–31 May, then 15 Jun – 1 Nov 2026",
    src:"https://www.seilbahntechnik.net/de/lifts/1564/datas.htm" },
  { id:"hornbahn1", name:"Hornbahn I", area:"Kitzbüheler Horn · KitzSki", type:"6-seat gondola · 1991",
    valley:770, top:1276, length:1832, valleyLL:[47.4501,12.3948], topLL:[47.4638,12.4082],
    geo:"Valley + mid-station hub verified (Google Places)",
    season:"23 May – 11 Oct 2026", src:"https://www.seilbahntechnik.net/de/lifts/1567/datas.htm" },
  { id:"hornbahn2", name:"Hornbahn II", area:"Kitzbüheler Horn · KitzSki", type:"6-seat gondola · 1991",
    valley:1276, top:1664, length:1689, valleyLL:[47.4638,12.4082], topLL:[47.46694,12.42917],
    geo:"Mid-station + Alpenhaus top verified (Google Places)",
    season:"23 May – 11 Oct 2026", src:"https://www.seilbahntechnik.net/de/lifts/1568/datas.htm" },
  { id:"horngipfel", name:"Horngipfelbahn", area:"Kitzbüheler Horn · KitzSki", type:"Aerial tramway · 1955/97",
    valley:1279, top:1966, length:2146, valleyLL:[47.4638,12.4082], topLL:[47.4763,12.4302],

/* ===== Nearby Alms & huts — OpenStreetMap Overpass, fetched by map view when zoomed in ===== */
const ALM_ZOOM=13;
const almSeen={};      // osmId -> {id,name,lat,lon,hours,hut}
const almMarkers={};   // osmId -> L.marker
let almBusy=false, almTimer=null;
function almEsc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function gmaps(a){return 'https://www.google.com/maps/search/'+encodeURIComponent(a.name)+'/@'+a.lat+','+a.lon+',17z';}
function almState(a){            // g=open during hiking hours on the selected day, r=closed, x=unknown/unparseable
  const OH=window.opening_hours;
  if(!a.hours || !OH) return 'x';
  try{
    const oh=new OH(a.hours);
    const d=activeDay.split('-').map(Number);
    const from=new Date(d[0],d[1]-1,d[2],HIKE[0],0,0), to=new Date(d[0],d[1]-1,d[2],HIKE[1],0,0);
    const iv=oh.getOpenIntervals(from,to);
    return (iv && iv.length) ? 'g' : 'r';
  }catch(e){ return 'x'; }
}
function almIcon(a){
  return L.divIcon({className:'',iconSize:[26,26],iconAnchor:[13,13],
    html:`<div class="alm-pin ${almState(a)}">\u{1F6D6}</div>`});
}
function almPopup(a){
  const lbl={g:'Likely open during hiking hours',r:'Closed on this day',x:'Hours not listed'}[almState(a)];
  return `<b>${almEsc(a.name)}</b><br>${a.hours?almEsc(a.hours):'Hours not listed'}<br><span style="color:var(--mut)">${lbl}</span><br><a href="${gmaps(a)}" target="_blank" rel="noopener">Open in Google Maps \u2197</a>`;
}
function showAlm(a){
  let m=almMarkers[a.id];
  if(!m){ m=L.marker([a.lat,a.lon],{icon:almIcon(a)}).bindPopup(almPopup(a)); almMarkers[a.id]=m; }
  else { m.setIcon(almIcon(a)); m.setPopupContent(almPopup(a)); }
  if(map.getZoom()>=ALM_ZOOM){ if(!map.hasLayer(m)) m.addTo(map); }
  else if(map.hasLayer(m)) map.removeLayer(m);
}
function refreshAlms(){ for(const id in almSeen) showAlm(almSeen[id]); }   // recolor + re-gate visibility
async function fetchAlmsOnce(){          // one Overpass request at page load: huts within 5 km of every summit
  if(almBusy) return; almBusy=true;
  const parts=LIFTS.map(l=>`node["tourism"~"alpine_hut|wilderness_hut"]["name"](around:5000,${l.topLL[0]},${l.topLL[1]});way["tourism"~"alpine_hut|wilderness_hut"]["name"](around:5000,${l.topLL[0]},${l.topLL[1]});`).join('');
  const q=`[out:json][timeout:60];(${parts});out center;`;
  const ov='https://overpass-api.de/api/interpreter?data='+encodeURIComponent(q);
  const urls=[ov,'https://overpass.kumi.systems/api/interpreter?data='+encodeURIComponent(q),'https://api.allorigins.win/raw?url='+encodeURIComponent(ov),'https://corsproxy.io/?url='+encodeURIComponent(ov)];
  let j=null;
  for(let pass=0; pass<2 && !j; pass++) for(const u of urls){
    try{
      const ctrl=new AbortController(), to=setTimeout(()=>ctrl.abort(),20000);
      const r=await fetch(u,{signal:ctrl.signal}); clearTimeout(to);
      if(!r.ok) continue;
      const t=await r.text(); j=JSON.parse(t); break;
    }catch(_){}
  }
  almBusy=false;
  if(!j) return;
  for(const e of (j.elements||[])){
    const id=e.type+'/'+e.id; if(almSeen[id]) continue;
    const lat=e.lat??(e.center&&e.center.lat), lon=e.lon??(e.center&&e.center.lon), nm=e.tags&&e.tags.name;
    if(lat==null||lon==null||!nm) continue;
    almSeen[id]={id,name:nm,lat,lon,hours:e.tags.opening_hours||''};
    showAlm(almSeen[id]);
  }
}
function onAlmMove(){ refreshAlms(); }   // pan/zoom only toggles visibility + recolor; no fetching

/* ---- drive time from Gaisberg valley station, Kirchberg ---- */
const ORIGIN=[47.441206,12.316122];
function kmDist(a,b){const R=6371,dLat=(b[0]-a[0])*Math.PI/180,dLon=(b[1]-a[1])*Math.PI/180,la1=a[0]*Math.PI/180,la2=b[0]*Math.PI/180;const x=Math.sin(dLat/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
function driveMin(ll){return Math.max(2,Math.round(kmDist(ORIGIN,ll)*1.4));} // ~road estimate from straight-line distance
function mapsDir(ll){return `https://www.google.com/maps/dir/?api=1&origin=${ORIGIN[0]},${ORIGIN[1]}&destination=${ll[0]},${ll[1]}&travelmode=driving`;}
function flyToLift(l){ try{ map.flyToBounds(L.latLngBounds(l.valleyLL,l.topLL).pad(.3),{paddingTopLeft:[40,40],paddingBottomRight:[400,40],maxZoom:14,duration:.6}); }catch(e){} }
const driveRoad={}; // id -> minutes by road (OpenStreetMap / OSRM)
async function loadDriveTimes(){
  const ids=LIFTS.map(l=>l.id);                                   // capture order used to build the request
  const pts=[`${ORIGIN[1]},${ORIGIN[0]}`, ...LIFTS.map(l=>`${l.valleyLL[1]},${l.valleyLL[0]}`)].join(';');
  const url=`https://router.project-osrm.org/table/v1/driving/${pts}?sources=0&annotations=duration`;
  try{
    const j=await (await fetch(url)).json();
    const row=j&&j.durations&&j.durations[0];
    if(row){ ids.forEach((id,i)=>{ if(row[i+1]!=null) driveRoad[id]=Math.round(row[i+1]/60); }); render(); }
  }catch(e){ /* leave straight-line estimates in place */ }
}
function driveBadge(l){ if(l.id==='gaisberg') return '🚗 start'; const r=driveRoad[l.id]; return r!=null?('🚗 '+r+' min'):('🚗 ~'+driveMin(l.valleyLL)+' min'); }
function driveLine(l){
  if(l.id==='gaisberg') return '🚗 <b>Start point</b> — Gaisberg valley station, Kirchberg';
  const r=driveRoad[l.id];
  const t=r!=null
    ? `🚗 <b>${r} min</b> by road from Gaisberg, Kirchberg <span class="est">(OpenStreetMap routing)</span>`
    : `🚗 <b>~${driveMin(l.valleyLL)} min</b> from Gaisberg, Kirchberg <span class="est">(distance estimate — road time loading…)</span>`;
  return t+` · <a href="${mapsDir(l.valleyLL)}" target="_blank" rel="noopener">Route in Maps ↗</a>`;
}

function pin(sel){return L.divIcon({className:'',html:`<div class="pin ${sel?'sel':''}"></div>`,iconSize:[18,18],iconAnchor:[9,9]});}

const wxData={};                 // lift id -> {daily, hourly} from Open-Meteo
const HIKE=[10,16];              // hiking window for rain chance
const HLABEL=`${HIKE[0]}–${HIKE[1]}`;
const HMID=Math.floor((HIKE[0]+HIKE[1])/2);   // representative hour for icon/temp
let _statCache={};               // memo for dayStat within a data cycle
// Rain chance / icon / temp for the hiking window on a given day (falls back to daily aggregates)
function dayStat(l,day){
  const key=l.id+'|'+day; if(key in _statCache) return _statCache[key];
  const r=_dayStat(l,day); _statCache[key]=r; return r;
}
function _dayStat(l,day){
  const w=wxData[l.id]; if(!w) return null;
  const h=w.hourly, d=w.daily;
  let pp=null, code=null, temp=null, mid=null, psum=0, pn=0;
  if(h&&h.time){
    for(let i=0;i<h.time.length;i++){
      if(h.time[i].slice(0,10)!==day) continue;
      const hr=+h.time[i].slice(11,13);
      if(hr<HIKE[0]||hr>HIKE[1]) continue;
      const p=h.precipitation_probability[i];
      if(p!=null){ psum+=p; pn++; }
      if(hr===HMID||mid==null) mid=i;
    }
    if(pn>0) pp=Math.round(psum/pn);          // average rain chance over 10–16
    if(mid!=null){ code=h.weather_code[mid]; temp=Math.round(h.temperature_2m[mid]); }
  }
  let tmax=null,tmin=null;
  if(d&&d.time){ const di=d.time.indexOf(day); if(di>=0){ tmax=Math.round(d.temperature_2m_max[di]); tmin=Math.round(d.temperature_2m_min[di]); if(code==null){code=d.weather_code[di];temp=tmax;} if(pp==null)pp=d.precipitation_probability_max[di]; } }
  if(code==null&&pp==null&&temp==null) return null;
  return {pp,code,temp,tmax,tmin};
}
function wxIcon(l,sel){
  const s=dayStat(l,activeDay); if(!s||s.temp==null) return null;
  const ic=wmo(s.code)[0];
  const cls=s.pp==null?'':(s.pp>=60?'wet':(s.pp<=30?'dry':'mid'));
  return L.divIcon({className:'',html:`<div class="wxbadge ${sel?'sel':''} ${cls}">${ic} ${s.temp}°</div>`,iconSize:[54,22],iconAnchor:[27,32]});
}

const SEASONS={
  hahnenkamm:{r:[["05-01","05-31"],["06-15","11-01"]]},
  hornbahn1:{r:[["05-23","10-11"]]}, hornbahn2:{r:[["05-23","10-11"]]}, horngipfel:{r:[["05-23","10-11"]]},
  gaisberg:{r:[["05-09","10-26"]]},
  fleckalm:{r:[["06-04","10-11"]]}, sonnenrast:{r:[["06-13","10-11"]]},
  alpenrosen1:{r:[["05-23","10-26"]]}, alpenrosen2:{r:[["05-23","10-26"]]},
  hochbrixen:{r:[["05-23","10-26"]]},
  salven1:{r:[["05-14","10-26"]]}, salven2:{r:[["05-14","10-26"]]},
  hochsoell1:{r:[["05-09","11-01"]]}, hochsoell2:{r:[["07-01","11-01"]]},
  salvista:{r:[["05-23","11-01"]],wk:[1,2,3,4,5],dailyFrom:"07-04"},
  harschbichl:{r:[["05-14","10-26"]]},
  streuboden:{r:[["05-14","11-01"]]}, laerchfilz:{r:[["05-14","11-01"]]},
  steinplatte:{r:[["05-23","10-04"]]},
  buchenstein:{r:[["05-14","11-01"]]},
  almbahn1:{r:[["05-14","11-02"]],wk:[2,3],dailyFrom:"07-02"}, almbahn2:{r:[["05-14","11-02"]],wk:[2,3],dailyFrom:"07-02"},
  schatzberg:{r:[["06-04","10-04"]]},
  markbachjoch:{r:[["05-09","10-18"]]},
  wiedersberg:{r:[["05-23","06-07"],["06-20","11-08"]],wk:[1,2,3,4,5],dailyFrom:"06-20"},
  reitherkogel:{r:[["05-09","09-27"]],wk:[3]},
  kaiserlift:{r:[["05-01","11-01"]]},
};
function isOpen(l,dateISO){
  const s=SEASONS[l.id]; if(!s) return false;
  const md=dateISO.slice(5);
  if(!s.r.some(([a,b])=> a<=b ? (md>=a&&md<=b) : (md>=a||md<=b))) return false;
  if(s.wk && (!s.dailyFrom || md<s.dailyFrom)){
    if(s.wk.includes(new Date(dateISO+"T12:00:00").getDay())) return false;
  }
  return true;
}
const fmt=(d,o)=>new Date(d+"T12:00:00").toLocaleDateString('en-GB',o);

let sortKey='def', sortDir='asc';
const SLBL={def:'Default',temp:'Temp',rain:'Rain',drive:'Drive'};
function liftVal(l){
  if(sortKey==='temp'){const s=dayStat(l,activeDay);return s&&s.temp!=null?s.temp:null;}
  if(sortKey==='rain'){const s=dayStat(l,activeDay);return s&&s.pp!=null?s.pp:null;}
  if(sortKey==='drive'){return l.id==='gaisberg'?0:(driveRoad[l.id]??driveMin(l.valleyLL));}
  return null;
}
function sortLifts(arr){
  if(sortKey==='def') return arr;
  const sign=sortDir==='asc'?1:-1;
  return arr.slice().sort((a,b)=>{const va=liftVal(a),vb=liftVal(b);
    if(va==null&&vb==null)return 0; if(va==null)return 1; if(vb==null)return -1; return (va-vb)*sign;});
}
function updateSortUI(){
  const ar=sortKey==='def'?'':(sortDir==='asc'?' ↑':' ↓');
  document.getElementById('sortbtn').textContent='⇅ Sort: '+SLBL[sortKey]+ar;
  document.querySelectorAll('#sortopts .sortb').forEach(b=>{const k=b.dataset.k;
    b.classList.toggle('on',k===sortKey);
    b.textContent=SLBL[k]+(k===sortKey&&k!=='def'?(sortDir==='asc'?' ↑':' ↓'):'');});
}
document.getElementById('sortbtn').onclick=()=>document.getElementById('sortwrap').classList.toggle('open');
document.getElementById('sortopts').addEventListener('click',e=>{
  const b=e.target.closest('.sortb'); if(!b) return;
  const k=b.dataset.k;
  if(k===sortKey&&k!=='def'){sortDir=sortDir==='asc'?'desc':'asc';}
  else {sortKey=k; sortDir=(k==='temp')?'desc':'asc';}   // warmest-first for temp; driest/closest-first otherwise
  updateSortUI(); render();
});

function buildDays(){
  const c=document.getElementById('days'); c.innerHTML='';
  WINDOW.forEach(d=>{
    const n=LIFTS.filter(l=>isOpen(l,d)).length;
    const b=document.createElement('button');
    b.className='day'+(d===activeDay?' on':'')+(d===WINDOW[0]?' today':'');
    b.innerHTML=`<div class="wd">${d===WINDOW[0]?'Today':fmt(d,{weekday:'short'})}</div><div class="dt">${fmt(d,{day:'2-digit'})}</div><div class="c">${n} open</div>`;
    b.onclick=()=>{activeDay=d;render();};
    c.appendChild(b);
  });
}

function render(){
  document.querySelectorAll('.day').forEach((b,i)=>b.classList.toggle('on',WINDOW[i]===activeDay));
  const openOf={}; LIFTS.forEach(l=>openOf[l.id]=isOpen(l,activeDay));   // cache per render
  const openLifts=LIFTS.filter(l=>openOf[l.id]);
  LIFTS.forEach(l=>{
    const on=openOf[l.id], L3=layers[l.id];
    [L3.line,L3.marker,L3.topM].forEach(g=>{ on?(map.hasLayer(g)||g.addTo(map)):(map.hasLayer(g)&&map.removeLayer(g)); });
    if(on){const isSel=l.id===selected; L3.line.setStyle({opacity:selected?(isSel?.95:.18):.55,weight:isSel?6:4}); L3.marker.setIcon(pin(isSel));}
    const ic=on?wxIcon(l,l.id===selected):null;
    if(ic){ L3.wx.setIcon(ic); if(!map.hasLayer(L3.wx)) L3.wx.addTo(map); }
    else if(map.hasLayer(L3.wx)) map.removeLayer(L3.wx);
  });
  const list=document.getElementById('list');
  const closedLifts=LIFTS.filter(l=>!openOf[l.id]);
  list.innerHTML='';
  const mkRow=(l,closed)=>{
    const r=document.createElement('div');
    r.className='row'+(l.id===selected?' sel':'')+(closed?' closedrow':'');
    const drive=driveBadge(l);
    const right=closed?`<div class="climb"><b>—</b><span>closed</span></div>`
                      :`<div class="climb"><b>${l.climb}</b><span>m climb</span></div>`;
    r.innerHTML=`<span class="dot"></span><div><div class="nm">${l.name}</div><div class="sub">${l.area} · ${l.valley}→${l.top}\u202fm · ${drive}${closed?'':wxRowChip(l)}</div></div>${right}`;
    r.onclick=()=>select(l.id);
    return r;
  };
  if(!openLifts.length){list.innerHTML='<div class="empty">No lifts scheduled to run on this day.</div>';}
  sortLifts(openLifts).forEach(l=>list.appendChild(mkRow(l,false)));
  if(closedLifts.length){
    const h=document.createElement('div'); h.className='listdiv';
    h.textContent=`Closed on this day · ${closedLifts.length} (not shown on map)`;
    list.appendChild(h);
    sortLifts(closedLifts).forEach(l=>list.appendChild(mkRow(l,true)));
  }
  renderDetail();
  document.getElementById('headct').innerHTML=`<b>${openLifts.length}</b> open · ${fmt(activeDay,{weekday:'short',day:'numeric',month:'short'})}`;
  refreshAlms();
}

let panelState='min';
function setState(s){
  panelState=s;
  const p=document.getElementById('panel');
  p.classList.remove('state-min','state-list','state-detail');
  p.classList.add('state-'+s);
}
function goMin(){ selected=null; setState('min'); render(); }
function goList(){ selected=null; setState('list'); render(); }
function backToList(){ selected=null; setState('list'); render(); }
function select(id){
  selected=id; setState('detail'); render();
  const l=LIFTS.find(x=>x.id===id);
  if(l && isOpen(l,activeDay)){ try{ if(map.hasLayer(layers[id].marker)) layers[id].marker.openPopup(); }catch(e){} flyToLift(l); }
}
// One control on the header bar: tap to expand the list / minimize it
document.getElementById('phead').addEventListener('click',()=>{ if(panelState==='min') goList(); else if(panelState==='list') goMin(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ if(panelState==='detail') backToList(); else if(panelState==='list') goMin(); } });
document.getElementById('detail').addEventListener('click',e=>{
  if(e.target.closest('#dback')) return backToList();
  if(e.target.closest('#dmin')) return goMin();
  const sq=e.target.closest('.strip .d'); if(sq){ activeDay=sq.dataset.day; return render(); }
});

function renderDetail(){
  const el=document.getElementById('detail');
  if(!selected){el.innerHTML='';return;}
  const l=LIFTS.find(x=>x.id===selected);
  const strip=WINDOW.map(d=>`<div class="d ${isOpen(l,d)?'on':'off'}${d===activeDay?' act':''}" data-day="${d}" title="${fmt(d,{weekday:'long',day:'numeric',month:'short'})}">${fmt(d,{day:'2-digit'})}</div>`).join('');
  const openToday=isOpen(l,activeDay);
  el.innerHTML=`
    <div class="dtoolbar"><button class="dbtn" id="dback">← All lifts</button><button class="dbtn min" id="dmin">▾ Minimize</button></div>
    <h2>${l.name}</h2>
    <div class="tag">${l.area} · ${l.type}</div>
    <div class="alt">
      <div class="box"><div class="l">Start · valley</div><div class="v">${l.valley}<small> m</small></div></div>
      <div class="arrow">→</div>
      <div class="box"><div class="l">Top · mountain</div><div class="v">${l.top}<small> m</small></div></div>
    </div>
    <div class="climbline"><span class="l">Total climb</span><span class="v">${l.climb}<small> m</small></span></div>
    <div class="drive">${driveLine(l)}</div>
    <div class="wxlift">${liftWxHTML(l)}</div>
    <div class="hourly" id="hourlybox"><div class="muted" style="font-size:.78rem">hourly forecast loading…</div></div>
    ${l.length?`<div class="meta" style="margin-bottom:10px"><b>Track length</b> ${l.length} m</div>`:''}
    <div class="strip">${strip}</div>
    <div class="meta">
      <b style="color:${openToday?'var(--green)':'var(--amber)'}">${openToday?'● Open':'○ Closed'}</b> on ${fmt(activeDay,{weekday:'long',day:'numeric',month:'long'})}<br>
      Operating window: ${l.season}<br>
      <span style="color:var(--dim)">Coordinates: ${l.geo}</span><br>
      Source: <a href="${l.src}" target="_blank" rel="noopener">technical data ↗</a>
    </div>
    <div class="komootbox">
      <a class="kbtn" href="${komootURL(l)}" target="_blank" rel="noopener">🥾<span class="kt"><span>Explore hiking routes — Komoot</span><span class="ksub">routes from ${l.komoot||l.name}</span></span><span class="karr">↗</span></a>
    </div>`;
  paintHourly(l);
}

/* ===== Live weather (Open-Meteo, free, no API key) ===== */
function wmo(c){
  if(c===0)return['☀️','Clear'];
  if(c<=2)return['🌤️','Mostly clear'];
  if(c===3)return['☁️','Overcast'];
  if(c<=48)return['🌫️','Fog'];
  if(c<=57)return['🌦️','Drizzle'];
  if(c<=65)return['🌧️','Rain'];
  if(c<=67)return['🌧️','Freezing rain'];
  if(c<=77)return['🌨️','Snow'];
  if(c<=82)return['🌦️','Showers'];
  if(c<=86)return['🌨️','Snow showers'];
  return['⛈️','Thunderstorm'];
}
const WX_DAILY="weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max";
const WX_HOURLY="precipitation_probability,weather_code,temperature_2m";
function wxRowChip(l){
  const s=dayStat(l,activeDay); if(!s) return '';
  const ic=wmo(s.code)[0];
  if(s.pp==null) return ' · '+ic;
  const c=s.pp>=60?'#6ea8ff':(s.pp<=30?'#37e08a':'#f5b54a');
  return ` · ${ic} <span style="color:${c};font-weight:700">${s.pp}%</span>`;
}
function liftWxHTML(l){
  const url=`https://www.windy.com/?${l.topLL[0]},${l.topLL[1]},11`;
  const link=` · <a class="wxlink" href="${url}" target="_blank" rel="noopener">full forecast ↗</a>`;
  if(!wxData[l.id]) return '<span class="muted">weather loading…</span>'+link;
  const s=dayStat(l,activeDay);
  if(!s) return '<span class="muted">no forecast for this day (beyond 7-day range)</span>'+link;
  const wm=wmo(s.code!=null?s.code:0);
  const tl=s.tmax!=null?`${s.tmax}° / ${s.tmin}°`:(s.temp!=null?`${s.temp}°`:'—');
  return `<span class="ic">${wm[0]}</span><span><b>${tl}</b> · ${wm[1]}${s.pp!=null?` · <b>${s.pp}% avg rain ${HLABEL}</b>`:''} <span class="muted">(top station · ${fmt(activeDay,{weekday:'short',day:'numeric',month:'short'})})</span></span>`+link;
}
// One batched Open-Meteo request for every top station: 7-day daily + hourly.
async function loadAllWx(){
  const lat=LIFTS.map(l=>l.topLL[0].toFixed(4)).join(',');
  const lon=LIFTS.map(l=>l.topLL[1].toFixed(4)).join(',');
  const ele=LIFTS.map(l=>l.top).join(',');
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&elevation=${ele}&daily=${WX_DAILY}&hourly=${WX_HOURLY}&timezone=Europe%2FVienna&forecast_days=7`;
  try{
    const j=await (await fetch(url)).json();
    const arr=Array.isArray(j)?j:[j];
    LIFTS.forEach((l,k)=>{ if(arr[k] && !arr[k].error && (arr[k].daily||arr[k].hourly)) wxData[l.id]={daily:arr[k].daily, hourly:arr[k].hourly}; });
  }catch(e){ /* offline: badges simply won't show */ }
  _statCache={};
  render();
}

/* ===== Hourly forecast for the selected station/day (from the shared batch) ===== */
function paintHourly(l){
  const b=document.getElementById('hourlybox'); if(!b) return;
  const w=wxData[l.id], h=w&&w.hourly;
  if(!h||!h.time){ b.innerHTML='<div class="muted" style="font-size:.78rem">hourly forecast loading…</div>'; return; }
  const idx=[]; h.time.forEach((t,i)=>{ if(t.slice(0,10)===activeDay){ const hr=+t.slice(11,13); if(hr>=HIKE[0]&&hr<=HIKE[1]) idx.push(i); }});
  if(!idx.length){ b.innerHTML='<div class="muted" style="font-size:.78rem">no hourly data for this day (beyond range)</div>'; return; }
  const cells=idx.map(i=>{
    const hr=+h.time[i].slice(11,13), ic=wmo(h.weather_code[i])[0], pp=h.precipitation_probability[i], tp=Math.round(h.temperature_2m[i]);
    const wet=pp!=null&&pp>=50;
    return `<div class="hr${wet?' wet':''}"><span class="hh">${String(hr).padStart(2,'0')}</span><span class="hi">${ic}</span><span class="hp">${pp!=null?pp+'%':'–'}</span><span class="ht">${tp}°</span></div>`;
  }).join('');
  const day=idx.slice();
  let runs=[],cur=[]; day.forEach(i=>{ const pp=h.precipitation_probability[i]??0; if(pp<=30) cur.push(i); else {if(cur.length)runs.push(cur);cur=[];} }); if(cur.length)runs.push(cur);
  runs.sort((a,c)=>c.length-a.length);
  let summary;
  if(runs.length && runs[0].length>=2){ const r=runs[0]; summary=`<b style="color:var(--green)">driest ${h.time[r[0]].slice(11,16)}–${String(+h.time[r[r.length-1]].slice(11,13)+1).padStart(2,'0')}:00</b> · ≤30% rain`; }
  else if(day.length){ let mi=day[0]; day.forEach(i=>{ if((h.precipitation_probability[i]??100)<(h.precipitation_probability[mi]??100)) mi=i; }); summary=`<b style="color:var(--amber)">wet ${HLABEL}</b> · best ~${h.time[mi].slice(11,16)} (${h.precipitation_probability[mi]??'?'}%)`; }
  else summary='';
  b.innerHTML=`<div class="hourlyhead">Hiking hours · ${fmt(activeDay,{weekday:'short',day:'numeric',month:'short'})} · <span style="color:var(--txt)">${String(HIKE[0]).padStart(2,'0')}:00–${String(HIKE[1]).padStart(2,'0')}:00</span>${summary?' · '+summary:''}</div><div class="hours">${cells}</div>`;
}

buildDays();
updateSortUI();
render();
loadAllWx();
loadDriveTimes();
fetchAlmsOnce();
setInterval(loadAllWx, 30*60*1000); // refresh forecast every 30 min while open
</script>
